<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Generator Imagini Erori</title>
    <style>
        /* Fundal similar cu cel al footer-ului tău */
        body {
            background-color: #222222; /* Ajustează nuanța dacă e nevoie */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Clasa ta originală, scalată pentru o imagine de dimensiuni mari */
        .titlu {
            font-family: 'Arial Black', Impact, sans-serif;
            font-size: 15rem; /* Foarte mare, ideal pentru screenshot */
            text-transform: uppercase;
            color: #fdfaf0; 
            margin: 200px;
            letter-spacing: 10px;
            /* Umbra 3D proporțional mărită */
            text-shadow: 
                -3px -3px 0 #111111,  
                 3px -3px 0 #111111,
                -3px  3px 0 #111111,
                 3px  3px 0 #111111,
                 5px  5px 0 #111111,
                 8px  8px 0 #111111,
                 11px  11px 0 #111111,
                 15px  15px 0 #111111,
                 19px  19px 0 #111111;
        }
    </style>
</head>
<body>

    <h2 class="titlu">Eroare Default</h2>

</body>
</html>
